name: ci

on:
  push:
  pull_request:
  # Full matrix runs on a schedule (weekly) and on manual dispatch.
  schedule:
    - cron: "0 9 * * 1"  # Mondays 09:00 UTC
  workflow_dispatch:

jobs:
  verify_core:
    name: "verify (core: ubuntu+windows, py3.10)"
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        py: ["3.10"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Lint + typecheck
        run: |
          ruff format --check .
          ruff check .
          mypy src/btg
      - name: Tests
        run: |
          pytest -q
      - name: Build packs
        run: |
          python scripts/build_packs.py
  verify_full:
    name: "verify (full matrix)"
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        py: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Lint + typecheck
        run: |
          ruff format --check .
          ruff check .
          mypy src/btg
      - name: Tests
        run: |
          pytest -q
      - name: Build packs
        run: |
          python scripts/build_packs.py
